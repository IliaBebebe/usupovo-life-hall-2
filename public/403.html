<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#E7E5E4">
    <title>403 - Доступ запрещён | Usupovo Life Hall</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --surface: #E7E5E4;
            --surface-light: #EFEDEB;
            --surface-dark: #D1CFC9;
            --text: #1E2938;
            --text-light: #6B7280;
            --text-muted: #9CA3AF;
            --primary: #006666;
            --danger: #FF2157;

            --shadow-light: -6px -6px 16px rgba(255, 255, 255, 0.7);
            --shadow-dark: 6px 6px 16px rgba(0, 0, 0, 0.12);
            --shadow-float: 8px 8px 24px rgba(0, 0, 0, 0.15), -8px -8px 24px rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: var(--surface);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .error-container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: var(--danger);
            text-shadow:
                -3px -3px 8px rgba(255, 255, 255, 0.7),
                3px 3px 8px rgba(0, 0, 0, 0.15);
            margin-bottom: 1rem;
            line-height: 1;
        }

        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 1rem;
        }

        .error-message {
            font-size: 0.95rem;
            color: var(--text-light);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.75rem;
            background: var(--surface);
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 12px;
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            box-shadow:
                -6px -6px 16px rgba(255, 255, 255, 0.7),
                6px 6px 16px rgba(0, 0, 0, 0.12);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            box-shadow:
                -8px -8px 24px rgba(255, 255, 255, 0.8),
                8px 8px 24px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        .btn:active {
            box-shadow:
                inset 4px 4px 8px rgba(0, 0, 0, 0.1),
                inset -4px -4px 8px rgba(255, 255, 255, 0.9);
            transform: translateY(0);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #005555;
        }

        .logo-container {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo {
            max-width: 300px;
            height: auto;
            box-shadow:
                -6px -6px 16px rgba(255, 255, 255, 0.7),
                6px 6px 16px rgba(0, 0, 0, 0.12);
            border-radius: 12px;
        }

        @media (max-width: 600px) {
            .error-code {
                font-size: 5rem;
            }

            .error-title {
                font-size: 1.25rem;
            }

            .error-message {
                font-size: 0.875rem;
            }

            .logo {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="logo-container">
            <img src="/images/logo-big.png" alt="Usupovo Life Hall" class="logo" onerror="this.style.display='none'">
        </div>

        <h1 class="error-code">403</h1>

        <h2 class="error-title">Доступ запрещён</h2>

        <p class="error-message">
            У вас нет прав для доступа к этой странице.
        </p>

        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
            <a href="/" class="btn btn-primary">
                На главную
            </a>
        </div>
    </div>

    <script>
        console.log('403 Error - Access denied:', window.location.pathname);
    </script>
</body>
</html>
